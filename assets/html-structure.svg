<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc"><title id="title">HTML document structure diagram</title><desc id="desc">A simple diagram showing doctype, html, head, and body sections.</desc><rect width="960" height="540" fill="#f6f8fb"/><rect x="80" y="70" width="800" height="400" rx="18" fill="#fff" stroke="#d8e0e8" stroke-width="3"/><text x="120" y="125" font-family="Arial" font-size="30" font-weight="700" fill="#111827">HTML document</text><rect x="120" y="165" width="720" height="56" rx="10" fill="#eff6ff" stroke="#bfdbfe"/><text x="150" y="202" font-family="Consolas, monospace" font-size="24" fill="#2563eb">&lt;!doctype html&gt;</text><rect x="120" y="245" width="330" height="150" rx="14" fill="#f8fafc" stroke="#cbd5e1"/><text x="150" y="292" font-family="Arial" font-size="28" font-weight="700" fill="#0f766e">head</text><text x="150" y="332" font-family="Arial" font-size="20" fill="#5f6b7a">title, meta, viewport</text><rect x="510" y="245" width="330" height="150" rx="14" fill="#fff7ed" stroke="#fed7aa"/><text x="540" y="292" font-family="Arial" font-size="28" font-weight="700" fill="#c2410c">body</text><text x="540" y="332" font-family="Arial" font-size="20" fill="#5f6b7a">heading, text, links</text></svg>