<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">배열 map 흐름 도식</title>
  <desc id="desc">원본 배열의 각 항목이 map 함수를 거쳐 새 배열로 변환되는 과정</desc>
  <rect width="960" height="420" fill="#f8fafc"/>
  <text x="70" y="72" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#0f172a">Array.map()</text>
  <text x="70" y="112" font-family="Arial, sans-serif" font-size="18" fill="#475569">각 항목을 같은 규칙으로 바꿔 새 배열을 만듭니다.</text>
  <g font-family="Arial, sans-serif" font-size="22" font-weight="700">
    <rect x="78" y="175" width="86" height="68" rx="12" fill="#dbeafe" stroke="#2563eb"/>
    <text x="107" y="218" fill="#1e3a8a">1</text>
    <rect x="184" y="175" width="86" height="68" rx="12" fill="#dbeafe" stroke="#2563eb"/>
    <text x="213" y="218" fill="#1e3a8a">2</text>
    <rect x="290" y="175" width="86" height="68" rx="12" fill="#dbeafe" stroke="#2563eb"/>
    <text x="319" y="218" fill="#1e3a8a">3</text>
  </g>
  <path d="M410 210h130" stroke="#64748b" stroke-width="5" stroke-linecap="round"/>
  <path d="M530 194l22 16-22 16" fill="none" stroke="#64748b" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="565" y="164" width="150" height="92" rx="18" fill="#111827"/>
  <text x="599" y="206" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#fff">item * 2</text>
  <text x="604" y="232" font-family="Arial, sans-serif" font-size="15" fill="#cbd5e1">변환 규칙</text>
  <path d="M735 210h70" stroke="#64748b" stroke-width="5" stroke-linecap="round"/>
  <path d="M795 194l22 16-22 16" fill="none" stroke="#64748b" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <g font-family="Arial, sans-serif" font-size="22" font-weight="700">
    <rect x="832" y="175" width="86" height="68" rx="12" fill="#dcfce7" stroke="#16a34a"/>
    <text x="861" y="218" fill="#14532d">2</text>
    <rect x="832" y="260" width="86" height="68" rx="12" fill="#dcfce7" stroke="#16a34a"/>
    <text x="861" y="303" fill="#14532d">4</text>
    <rect x="832" y="345" width="86" height="68" rx="12" fill="#dcfce7" stroke="#16a34a"/>
    <text x="861" y="388" fill="#14532d">6</text>
  </g>
</svg>
