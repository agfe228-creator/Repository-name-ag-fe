<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540"><rect width="960" height="540" fill="#f6f8fb"/><text x="80" y="90" font-family="Arial" font-size="34" font-weight="700" fill="#111827">Static site vs dynamic site</text><rect x="90" y="145" width="360" height="280" rx="20" fill="#fff" stroke="#d8e0e8" stroke-width="3"/><text x="150" y="210" font-family="Arial" font-size="30" font-weight="700" fill="#2563eb">Static</text><text x="130" y="270" font-family="Arial" font-size="22" fill="#5f6b7a">HTML file is served</text><text x="130" y="315" font-family="Consolas, monospace" font-size="20" fill="#111827">index.html</text><rect x="510" y="145" width="360" height="280" rx="20" fill="#fff" stroke="#d8e0e8" stroke-width="3"/><text x="570" y="210" font-family="Arial" font-size="30" font-weight="700" fill="#c2410c">Dynamic</text><text x="550" y="270" font-family="Arial" font-size="22" fill="#5f6b7a">Server builds response</text><text x="550" y="315" font-family="Consolas, monospace" font-size="20" fill="#111827">request + data</text></svg>